# Ephemeral Redis for chat session storage (TTL-based, no persistence needed).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: infraguid
  source:
    repoURL: https://github.com/infraGUID/infraguid-argocd.git
    targetRevision: main
    path: argocd-apps/infrastructure/redis
  destination:
    server: https://kubernetes.default.svc
    namespace: infraguid
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
