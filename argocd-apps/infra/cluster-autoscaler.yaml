apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-autoscaler
  namespace: argocd
spec:
  project: infraguid
  source:
    repoURL: https://kubernetes.github.io/autoscaler
    chart: cluster-autoscaler
    targetRevision: 9.37.0
    helm:
      values: |
        # Auto-discovers the EKS managed node group's ASG via the
        # k8s.io/cluster-autoscaler/<cluster> tags EKS applies automatically.
        autoDiscovery:
          clusterName: infraguidai-prod
        awsRegion: us-east-1
        # Pin the autoscaler image to the cluster's Kubernetes minor (1.30).
        image:
          tag: v1.30.2
        rbac:
          serviceAccount:
            create: true
            name: cluster-autoscaler
            annotations:
              # terraform output: irsa_cluster_autoscaler_role_arn
              eks.amazonaws.com/role-arn: arn:aws:iam::901607650789:role/infraguidai-prod-cluster-autoscaler-irsa
        extraArgs:
          balance-similar-node-groups: true
          skip-nodes-with-system-pods: false
          expander: least-waste
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
