apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
spec:
  project: infraguid
  source:
    repoURL: https://aws.github.io/eks-charts
    chart: aws-for-fluent-bit
    targetRevision: 0.1.34
    helm:
      values: |
        serviceAccount:
          create: true
          name: fluent-bit
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::901607650789:role/infraguidai-prod-fluent-bit-irsa
        cloudWatchLogs:
          enabled: true
          region: us-east-1
          logGroupName: /infraguid/prod/pod-logs
          logStreamPrefix: "pod-"
          autoCreateGroup: false
        firehose:
          enabled: false
        kinesis:
          enabled: false
        elasticsearch:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: amazon-cloudwatch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
