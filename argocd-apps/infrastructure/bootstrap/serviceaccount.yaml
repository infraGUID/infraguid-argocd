# Application service account, federated to the IRSA "app" role so pods can
# reach Bedrock / S3 / Secrets Manager without static credentials.
# Replace the role ARN with terraform output `irsa_app_role_arn`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infraguid-app
  namespace: infraguid
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::901607650789:role/infraguidai-prod-app-irsa
