apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: infraguid
      namespace: infraguid
      sectionName: https
  hostnames:
    - "grafana.nutritrack360.in"
  rules:
    - backendRefs:
        - name: prom-grafana
          port: 80
