# Kubernetes Gateway API resources, served by Envoy Gateway (in-cluster L7).
# Exposed to the internet via an AWS NLB (provisioned by the AWS LB Controller
# from the EnvoyProxy-managed Service). TLS is terminated ON THE NLB using ACM
# certs (apex + www); the NLB forwards decrypted plaintext to Envoy, which does
# the L7 path routing (/api -> chat-service, / -> frontend) and the HTTP->HTTPS
# redirect. ACM-only — no in-cluster cert material.
---
# Cluster-scoped GatewayClass handled by Envoy Gateway, parameterised by the
# EnvoyProxy below (which carries the NLB service annotations).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: infraguid-proxy
    namespace: infraguid
---
# Make the Envoy fleet's Service a public NLB with ACM TLS termination on :443.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: infraguid-proxy
  namespace: infraguid
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: external
          service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
          service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
          # NLB terminates TLS on :443 with a single ACM wildcard cert
          # (*.nutritrack360.in + nutritrack360.in apex) managed by Terraform
          # (module.dns). Covers every subdomain: www, argocd, grafana, …
          service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:901607650789:certificate/a3de2408-04e0-42f8-8979-a84c247b5b0f"
          service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
          service.beta.kubernetes.io/aws-load-balancer-ssl-negotiation-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
---
# The Gateway → two HTTP listeners. NLB:443 (TLS) decrypts to the :443 listener
# (plaintext HTTP at Envoy); NLB:80 maps to the :80 listener (redirect).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: infraguid
  namespace: infraguid
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTP
      port: 443
      allowedRoutes:
        namespaces:
          from: Same
---
# Application routing on the (TLS-offloaded) :443 listener.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infraguid-routes
  namespace: infraguid
spec:
  parentRefs:
    - name: infraguid
      sectionName: https
  hostnames:
    - "nutritrack360.in"
    - "www.nutritrack360.in"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: chat-service
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
---
# Force HTTP (:80) to HTTPS.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infraguid-redirect
  namespace: infraguid
spec:
  parentRefs:
    - name: infraguid
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
