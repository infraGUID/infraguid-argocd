# Classic AWS ALB Ingress, provisioned by the AWS Load Balancer Controller.
# A single shared ALB (group.name=infraguid) is split into two Ingresses so each
# backend gets its own target group with its own health check:
#   /api  -> chat-service:8000   (health check /api/health)
#   /     -> frontend:80         (health check /)
# HTTPS is terminated on the ALB with the ACM certificate; HTTP redirects to HTTPS.
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
spec:
  controller: ingress.k8s.aws/alb
---
# API: /api -> chat-service. Lower group.order = higher rule priority, so /api is
# evaluated before the frontend catch-all.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: infraguid
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: infraguid
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:901607650789:certificate/5e3e20f5-5666-414c-b5dc-0345e405082b,arn:aws:acm:us-east-1:901607650789:certificate/eee36b2d-2791-434f-9c30-611c78625284
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count: "3"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8000
---
# Frontend: catch-all "/" -> frontend nginx.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: infraguid
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: infraguid
    alb.ingress.kubernetes.io/group.order: "100"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:901607650789:certificate/5e3e20f5-5666-414c-b5dc-0345e405082b,arn:aws:acm:us-east-1:901607650789:certificate/eee36b2d-2791-434f-9c30-611c78625284
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
