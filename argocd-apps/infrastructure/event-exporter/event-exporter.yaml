# Kubernetes Event Exporter — ships k8s Warning Events to CloudWatch via stdout.
#
# Replaces the Bitnami Helm chart (whose public image was withdrawn in 2025)
# with plain manifests on the maintained upstream image
# resmoio/kubernetes-event-exporter — same config format, no external chart
# dependency (mirrors infrastructure/redis/).
#
# WHY: most k8s failure reasons (OOMKilled, ImagePullBackOff, FailedScheduling,
# Evicted, …) are Event objects, not container stdout. Fluent Bit only reads
# /var/log/containers, so those events never reach /infraguid/prod/pod-logs.
# This Deployment watches the Events API and writes Warning events to its own
# stdout shaped like a Fluent Bit record; Fluent Bit then ships them, and the
# log-intel subscription filter fires on the reason keyword.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-exporter
  namespace: amazon-cloudwatch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: event-exporter
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: event-exporter
subjects:
  - kind: ServiceAccount
    name: event-exporter
    namespace: amazon-cloudwatch
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: event-exporter-config
  namespace: amazon-cloudwatch
data:
  config.yaml: |
    logLevel: error
    logFormat: json
    receivers:
      - name: stdout
        file:
          path: /dev/stdout
          # Shape the output as a Fluent Bit-style record so collect.py can parse
          # pod name + namespace without code changes. `log` holds the reason +
          # message the CloudWatch filter / ANOMALY_PATTERNS substring-match on.
          layout:
            log: "{{ .Reason }}: {{ .Message }}"
            kubernetes:
              pod_name: "{{ .InvolvedObject.Name }}"
              namespace_name: "{{ .InvolvedObject.Namespace }}"
              container_name: "{{ .InvolvedObject.FieldPath }}"
              reason: "{{ .Reason }}"
              kind: "{{ .InvolvedObject.Kind }}"
    route:
      routes:
        # Only Warning events — Normal events are too noisy.
        - match:
            - receiver: stdout
              type: Warning
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-exporter
  namespace: amazon-cloudwatch
  labels:
    app: event-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-exporter
  template:
    metadata:
      labels:
        app: event-exporter
    spec:
      serviceAccountName: event-exporter
      containers:
        - name: event-exporter
          image: resmoio/kubernetes-event-exporter:v1.1
          imagePullPolicy: IfNotPresent
          args: ["-conf=/data/config.yaml"]
          volumeMounts:
            - name: config
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: event-exporter-config
