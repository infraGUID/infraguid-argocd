name: agent-service
namespace: infraguid
replicas: 2
serviceAccountName: infraguid-app
port: 8001
healthPath: /health

image:
  repository: 901607650789.dkr.ecr.us-east-1.amazonaws.com/infragui/agent-service
  tag: main-c12580e84d3f1ec6d0c28a4abfc238b1b4c5efa3
  pullPolicy: IfNotPresent

env:
  APP_ENV: production
  LOG_LEVEL: INFO
  AWS_REGION: us-east-1
  AWS_SECRET_NAME: infraguidai/prod/app-secrets
  RAG_SERVICE_URL: http://rag-service:8002

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Default-deny network policy. Only the flows below are allowed.
networkPolicy:
  enabled: true
  # ALB-facing? agent-service is internal only.
  allowExternal: false
  # Allowed inbound peers (same-namespace app labels) on .Values.port (8001).
  ingressFrom:
    - chat-service
  # Allowed outbound peers (same-namespace app labels) on the given ports.
  egressTo:
    - app: rag-service
      port: 8002
  egressDNS: true   # CoreDNS
  egressHTTPS: true  # AWS Bedrock + Secrets Manager
