name: agent-service
namespace: infraguid
replicas: 2
serviceAccountName: infraguid-app
port: 8001
healthPath: /health

image:
  repository: 901607650789.dkr.ecr.us-east-1.amazonaws.com/infragui/agent-service
  tag: v1.0.0
  pullPolicy: IfNotPresent

env:
  APP_ENV: production
  LOG_LEVEL: INFO
  AWS_REGION: us-east-1
  AWS_SECRET_NAME: infraguidai/prod/app-secrets
  RAG_SERVICE_URL: http://rag-service:8002

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

networkPolicy:
  enabled: true
  allowExternal: false
  ingressFrom:
    - chat-service
  egressTo:
    - app: rag-service
      port: 8002
  egressDNS: true   # CoreDNS
  egressHTTPS: true  # AWS Bedrock + Secrets Manager
