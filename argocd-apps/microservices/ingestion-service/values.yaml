name: ingestion-service
namespace: infraguid
replicas: 1
serviceAccountName: infraguid-app
port: 8003
healthPath: /health

image:
  repository: 901607650789.dkr.ecr.us-east-1.amazonaws.com/infragui/ingestion-service
  tag: v1.0.0
  pullPolicy: IfNotPresent

knowledgeBaseBucket: infraguidai-prod-knowledge-base-901607650789

env:
  APP_ENV: production
  LOG_LEVEL: INFO
  AWS_REGION: us-east-1
  AWS_SECRET_NAME: infraguidai/prod/app-secrets
  KNOWLEDGE_BASE_PATH: /app/knowledge-base
  INGESTION_WORKER_ENABLED: "true"

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

networkPolicy:
  enabled: true
  allowExternal: false
  ingressFrom:
    - chat-service
  egressTo: []
  egressDNS: true   # CoreDNS
  egressHTTPS: true  # AWS S3 (knowledge base sync) + Secrets Manager
  egressPostgres: true  # RDS 5432 within VPC
