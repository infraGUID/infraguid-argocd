name: ingestion-service
namespace: infraguid
replicas: 1
serviceAccountName: infraguid-app
port: 8003
healthPath: /health

image:
  repository: 901607650789.dkr.ecr.us-east-1.amazonaws.com/infragui/ingestion-service
  tag: main-c12580e84d3f1ec6d0c28a4abfc238b1b4c5efa3
  pullPolicy: IfNotPresent

# Knowledge base S3 bucket (terraform output: knowledge_base_bucket_name).
# An initContainer syncs it into /app/knowledge-base before startup.
knowledgeBaseBucket: infraguidai-prod-knowledge-base-901607650789

env:
  APP_ENV: production
  LOG_LEVEL: INFO
  AWS_REGION: us-east-1
  AWS_SECRET_NAME: infraguidai/prod/app-secrets
  KNOWLEDGE_BASE_PATH: /app/knowledge-base

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
