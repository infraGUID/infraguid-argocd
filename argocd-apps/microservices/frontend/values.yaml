name: frontend
namespace: infraguid
replicas: 2
port: 80

image:
  repository: 901607650789.dkr.ecr.us-east-1.amazonaws.com/infragui/frontend
  tag: v1.0.2
  pullPolicy: IfNotPresent

# Cognito config injected into /js/config.js (terraform outputs).
cognito:
  userPoolId: us-east-1_6j2IJV8GW
  appClientId: mrp68u2ab77qlirmp15aoaakd
  region: us-east-1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Default-deny network policy. Only the flows below are allowed.
networkPolicy:
  enabled: true
  # Static site served to the public via the AWS ALB. The browser calls /api
  # directly through the ALB, so the frontend pod itself needs no app egress.
  allowExternal: true
  ingressFrom: []
  egressTo: []
  egressDNS: true
  egressHTTPS: false
