name: rag-service
namespace: infraguid
replicas: 2
serviceAccountName: infraguid-app
port: 8002
healthPath: /health

image:
  repository: 901607650789.dkr.ecr.us-east-1.amazonaws.com/infragui/rag-service
  tag: v1.0.0
  pullPolicy: IfNotPresent

env:
  APP_ENV: production
  LOG_LEVEL: INFO
  AWS_REGION: us-east-1
  AWS_SECRET_NAME: infraguidai/prod/app-secrets

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

networkPolicy:
  enabled: true
  allowExternal: false
  ingressFrom:
    - agent-service
  egressTo: []
  egressDNS: true   # CoreDNS
  egressHTTPS: true  # AWS Bedrock embeddings + Secrets Manager
  egressPostgres: true  # RDS 5432 within VPC
