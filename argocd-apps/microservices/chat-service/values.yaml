name: chat-service
namespace: infraguid
replicas: 2
serviceAccountName: infraguid-app
port: 8000
healthPath: /api/health

image:
  repository: 901607650789.dkr.ecr.us-east-1.amazonaws.com/infragui/chat-service
  tag: v1.0.0
  pullPolicy: IfNotPresent

env:
  APP_ENV: production
  LOG_LEVEL: INFO
  AWS_REGION: us-east-1
  AWS_SECRET_NAME: infraguidai/prod/app-secrets
  FRONTEND_ORIGIN: https://nutritrack360.in
  REDIS_URL: redis://redis:6379/0
  AGENT_SERVICE_URL: http://agent-service:8001
  INGESTION_SERVICE_URL: http://ingestion-service:8003

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

networkPolicy:
  enabled: true
  allowExternal: true
  ingressFrom: []
  egressTo:
    - app: agent-service
      port: 8001
    - app: ingestion-service
      port: 8003
    - app: redis
      port: 6379
  egressDNS: true   # CoreDNS
  egressHTTPS: true  # AWS Cognito + Secrets Manager
  egressPostgres: true  # RDS 5432 within VPC
