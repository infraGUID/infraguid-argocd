apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infraguid-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infraguid
  source:
    repoURL: https://github.com/infraGUID/infraguid-argocd.git
    targetRevision: main
    path: argocd-apps
    directory:
      recurse: true
      include: "{apps/*.yaml,infra/*.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
